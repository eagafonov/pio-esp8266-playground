; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
upload_port = /dev/ttyUSB0
upload_speed = 921600
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

build_src_filter =
    -<**>

[arduino]
framework = arduino

[esp8266]
extends=arduino
platform = espressif8266
upload_speed = 921600

[esp32s3]
extends=arduino
platform = espressif32
upload_speed = 921600
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[hw:seeed-xiao-esp32s3-plus]
extends=esp32s3
board = seeed_xiao_esp32s3

[hw:wemos-d1-mini]
extends=esp8266
board = d1_mini

[hw:default]
extends=hw:wemos-d1-mini
# extends=hw:seeed-xiao-esp32s3-plus

[env:hello-world]
extends=hw:default
build_src_filter =
	${env.build_src_filter}
	+<hello-world/**>

[env:gpio]
extends=hw:default
build_src_filter =
	${env.build_src_filter}
	+<gpio/**>

[env:logic-analyzer]
extends=hw:default
build_src_filter =
	${env.build_src_filter}
	+<logic-analyzer/**>

[env:logic-analyzer-debug]
extends=hw:default
build_flags = -DDEBUG_PROTOCOL=1
build_src_filter =
	${env.build_src_filter}
	+<logic-analyzer/**>

[env:leds]
extends=hw:default
build_src_filter =
	${env.build_src_filter}
	+<leds/**>

[env:i2c-scanner]
extends=hw:default
build_src_filter =
	${env.build_src_filter}
	+<i2c-scanner/**>

[env:mpu6050-demo]
extends=hw:default
; Define the device ID for Fake MPU6050
; 0x68 = genuine MPU6050
; 0x98 = some MPU6050 clones
build_flags = -DMPU6050_DEVICE_ID=0x98
build_src_filter =
       ${env.build_src_filter}
       +<mpu6050-demo/**>
